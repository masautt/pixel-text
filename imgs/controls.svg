<svg viewBox="0 0 320 520" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="320" height="520" fill="#1a1a22" rx="10"/>
  <rect x="0" y="0" width="320" height="520" fill="none" stroke="#2a2a35" stroke-width="1" rx="10"/>

  <!-- Section: Input -->
  <text x="20" y="36" font-size="9" fill="#666680" letter-spacing="2">INPUT TEXT</text>
  <rect x="20" y="44" width="280" height="56" fill="#0d0d0f" rx="3" stroke="#e8ff47" stroke-width="1"/>
  <text x="32" y="76" font-size="13" fill="#e2e2e8">GAME OVER</text>

  <!-- Divider -->
  <rect x="20" y="112" width="280" height="1" fill="#2a2a35"/>

  <!-- Spacing -->
  <text x="20" y="134" font-size="9" fill="#666680" letter-spacing="2">SPACING</text>

  <text x="20" y="154" font-size="10" fill="#888899">Letter spacing</text>
  <text x="300" y="154" font-size="10" fill="#e8ff47" text-anchor="end" font-weight="bold">2px</text>
  <rect x="20" y="160" width="280" height="4" fill="#2a2a35" rx="2"/>
  <rect x="20" y="160" width="73" height="4" fill="#e8ff47" rx="2"/>
  <circle cx="93" cy="162" r="8" fill="#e8ff47"/>

  <text x="20" y="192" font-size="10" fill="#888899">Space width</text>
  <text x="300" y="192" font-size="10" fill="#e8ff47" text-anchor="end" font-weight="bold">8px</text>
  <rect x="20" y="198" width="280" height="4" fill="#2a2a35" rx="2"/>
  <rect x="20" y="198" width="196" height="4" fill="#e8ff47" rx="2"/>
  <circle cx="216" cy="200" r="8" fill="#e8ff47"/>

  <text x="20" y="230" font-size="10" fill="#888899">Padding</text>
  <text x="300" y="230" font-size="10" fill="#e8ff47" text-anchor="end" font-weight="bold">4px</text>
  <rect x="20" y="236" width="280" height="4" fill="#2a2a35" rx="2"/>
  <rect x="20" y="236" width="112" height="4" fill="#e8ff47" rx="2"/>
  <circle cx="132" cy="238" r="8" fill="#e8ff47"/>

  <text x="20" y="268" font-size="10" fill="#888899">Line spacing</text>
  <text x="300" y="268" font-size="10" fill="#e8ff47" text-anchor="end" font-weight="bold">3px</text>
  <rect x="20" y="274" width="280" height="4" fill="#2a2a35" rx="2"/>
  <rect x="20" y="274" width="84" height="4" fill="#e8ff47" rx="2"/>
  <circle cx="104" cy="276" r="8" fill="#e8ff47"/>

  <!-- Divider -->
  <rect x="20" y="300" width="280" height="1" fill="#2a2a35"/>

  <!-- Pixel Grid -->
  <text x="20" y="322" font-size="9" fill="#666680" letter-spacing="2">PIXEL GRID</text>

  <text x="20" y="342" font-size="10" fill="#888899">Cell size</text>
  <text x="300" y="342" font-size="10" fill="#e8ff47" text-anchor="end" font-weight="bold">16px</text>
  <rect x="20" y="348" width="280" height="4" fill="#2a2a35" rx="2"/>
  <rect x="20" y="348" width="196" height="4" fill="#e8ff47" rx="2"/>
  <circle cx="216" cy="350" r="8" fill="#e8ff47"/>

  <!-- Colors row -->
  <text x="20" y="382" font-size="9" fill="#666680">ON PIXEL</text>
  <text x="120" y="382" font-size="9" fill="#666680">OFF A</text>
  <text x="220" y="382" font-size="9" fill="#666680">OFF B</text>

  <rect x="20" y="390" width="85" height="32" fill="#ff6b47" rx="3" stroke="#2a2a35" stroke-width="1"/>
  <rect x="117" y="390" width="85" height="32" fill="#1a1a2e" rx="3" stroke="#2a2a35" stroke-width="1"/>
  <rect x="214" y="390" width="86" height="32" fill="#16213e" rx="3" stroke="#2a2a35" stroke-width="1"/>

  <!-- Download button -->
  <rect x="20" y="444" width="280" height="40" fill="transparent" rx="3" stroke="#2a2a35" stroke-width="1"/>
  <text x="160" y="470" font-size="11" fill="#e2e2e8" text-anchor="middle" letter-spacing="3">↓ DOWNLOAD PNG</text>

  <!-- Caption -->
  <text x="160" y="508" font-size="10" fill="#666680" text-anchor="middle">Controls Panel — all settings update the canvas in real-time</text>
</svg>
