    <rect x="12" y="57" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="12" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="21" y="39" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="30" y="39" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="39" y="12" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="39" y="21" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="39" y="30" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="39" y="39" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="39" y="48" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="39" y="57" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="39" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>

    <!-- E letter -->
