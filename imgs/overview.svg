<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <!-- Background -->
  <rect width="900" height="560" fill="#0d0d0f" rx="10"/>

  <!-- Header -->
  <rect width="900" height="56" fill="#141418" rx="0"/>
  <rect y="55" width="900" height="1" fill="#2a2a35"/>
  <text x="32" y="36" font-size="22" fill="#e8ff47" font-family="monospace" letter-spacing="3" font-weight="bold">DREDGE·TEXT</text>
  <text x="178" y="34" font-size="10" fill="#666680" letter-spacing="2" text-transform="uppercase">PIXEL FONT RENDERER</text>

  <!-- Sidebar -->
  <rect x="0" y="56" width="260" height="504" fill="#1a1a22"/>
  <rect x="260" y="56" width="1" height="504" fill="#2a2a35"/>

  <!-- Sidebar: Input label -->
  <text x="20" y="92" font-size="9" fill="#666680" letter-spacing="2">INPUT TEXT</text>
  <!-- Textarea -->
  <rect x="20" y="100" width="220" height="56" fill="#0d0d0f" rx="3" stroke="#e8ff47" stroke-width="1"/>
  <text x="32" y="128" font-size="13" fill="#e2e2e8">Hello World</text>

  <!-- Divider -->
  <rect x="20" y="168" width="220" height="1" fill="#2a2a35"/>

  <!-- Spacing section -->
  <text x="20" y="190" font-size="9" fill="#666680" letter-spacing="2">SPACING</text>

  <!-- Letter spacing -->
  <text x="20" y="210" font-size="10" fill="#666680">Letter spacing</text>
  <text x="220" y="210" font-size="10" fill="#e8ff47" text-anchor="end">1px</text>
  <rect x="20" y="216" width="220" height="4" fill="#2a2a35" rx="2"/>
  <rect x="20" y="216" width="50" height="4" fill="#e8ff47" rx="2"/>
  <circle cx="70" cy="218" r="7" fill="#e8ff47"/>

  <!-- Space width -->
  <text x="20" y="244" font-size="10" fill="#666680">Space width</text>
  <text x="220" y="244" font-size="10" fill="#e8ff47" text-anchor="end">5px</text>
  <rect x="20" y="250" width="220" height="4" fill="#2a2a35" rx="2"/>
  <rect x="20" y="250" width="110" height="4" fill="#e8ff47" rx="2"/>
  <circle cx="130" cy="252" r="7" fill="#e8ff47"/>

  <!-- Padding -->
  <text x="20" y="278" font-size="10" fill="#666680">Padding</text>
  <text x="220" y="278" font-size="10" fill="#e8ff47" text-anchor="end">2px</text>
  <rect x="20" y="284" width="220" height="4" fill="#2a2a35" rx="2"/>
  <rect x="20" y="284" width="44" height="4" fill="#e8ff47" rx="2"/>
  <circle cx="64" cy="286" r="7" fill="#e8ff47"/>

  <!-- Line spacing -->
  <text x="20" y="312" font-size="10" fill="#666680">Line spacing</text>
  <text x="220" y="312" font-size="10" fill="#e8ff47" text-anchor="end">1px</text>
  <rect x="20" y="318" width="220" height="4" fill="#2a2a35" rx="2"/>
  <rect x="20" y="318" width="22" height="4" fill="#e8ff47" rx="2"/>
  <circle cx="42" cy="320" r="7" fill="#e8ff47"/>

  <!-- Divider -->
  <rect x="20" y="342" width="220" height="1" fill="#2a2a35"/>

  <!-- Pixel grid section -->
  <text x="20" y="364" font-size="9" fill="#666680" letter-spacing="2">PIXEL GRID</text>

  <!-- Cell size -->
  <text x="20" y="384" font-size="10" fill="#666680">Cell size</text>
  <text x="220" y="384" font-size="10" fill="#e8ff47" text-anchor="end">12px</text>
  <rect x="20" y="390" width="220" height="4" fill="#2a2a35" rx="2"/>
  <rect x="20" y="390" width="132" height="4" fill="#e8ff47" rx="2"/>
  <circle cx="152" cy="392" r="7" fill="#e8ff47"/>

  <!-- Color pickers -->
  <text x="20" y="420" font-size="9" fill="#666680">On pixel</text>
  <rect x="20" y="428" width="68" height="28" fill="#111111" rx="3" stroke="#2a2a35" stroke-width="1"/>

  <text x="98" y="420" font-size="9" fill="#666680">Off A</text>
  <rect x="98" y="428" width="68" height="28" fill="#c8c8c8" rx="3" stroke="#2a2a35" stroke-width="1"/>

  <text x="176" y="420" font-size="9" fill="#666680">Off B</text>
  <rect x="176" y="428" width="64" height="28" fill="#f0f0f0" rx="3" stroke="#2a2a35" stroke-width="1"/>

  <!-- Download button -->
  <rect x="20" y="490" width="220" height="36" fill="transparent" rx="3" stroke="#2a2a35" stroke-width="1"/>
  <text x="130" y="514" font-size="11" fill="#e2e2e8" text-anchor="middle" letter-spacing="2">↓ DOWNLOAD PNG</text>

  <!-- Canvas area background -->
  <rect x="261" y="56" width="639" height="504" fill="#0d0d0f"/>
  <!-- Subtle grid pattern -->
  <pattern id="checker" width="16" height="16" patternUnits="userSpaceOnUse">
    <rect width="16" height="16" fill="transparent"/>
    <rect width="8" height="8" fill="rgba(255,255,255,0.012)"/>
    <rect x="8" y="8" width="8" height="8" fill="rgba(255,255,255,0.012)"/>
  </pattern>
  <rect x="261" y="56" width="639" height="504" fill="url(#checker)"/>

  <!-- Info bar -->
  <text x="580" y="100" font-size="9" fill="#666680" text-anchor="middle" letter-spacing="1">132 × 13 px  ·  cell 12px  ·  canvas 1584×156</text>

  <!-- Rendered pixel text: "Hello World" large pixel art simulation -->
  <!-- H -->
  <g transform="translate(310,140)" fill="none">
    <!-- Pixel blocks representing "Hello" in pixel art style, dark on light checker -->
    <!-- We'll draw a simplified pixel grid block -->
    <rect width="384" height="156" fill="#f0f0f0" rx="2" stroke="#2a2a35" stroke-width="1"/>

    <!-- Checkerboard off-pixels (simplified representation) -->
    <rect width="384" height="156" fill="none"/>

    <!-- "HELLO" pixel art approximation using small rects -->
    <!-- H letter -->
    <rect x="12" y="12" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="12" y="21" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="12" y="30" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="12" y="39" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
