    <rect x="60" y="21" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="60" y="30" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="60" y="39" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="60" y="48" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
