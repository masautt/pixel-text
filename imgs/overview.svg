    <rect x="60" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="69" y="12" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="78" y="12" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="87" y="12" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="69" y="39" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="78" y="39" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="69" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="78" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="87" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>

    <!-- L letter -->
    <rect x="108" y="12" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="108" y="21" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="108" y="30" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="108" y="39" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="108" y="48" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="108" y="57" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="108" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="117" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="126" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>

    <!-- L letter 2 -->
    <rect x="147" y="12" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="147" y="21" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="147" y="30" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="147" y="39" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="147" y="48" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="147" y="57" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="147" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="156" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="165" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>

    <!-- O letter -->
    <rect x="186" y="12" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="195" y="12" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="204" y="12" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="186" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="195" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="204" y="66" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="177" y="21" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="177" y="30" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="177" y="39" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="177" y="48" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="177" y="57" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="213" y="21" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="213" y="30" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="213" y="39" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="213" y="48" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
    <rect x="213" y="57" width="9" height="9" fill="#111" stroke="white" stroke-width="0.5"/>
