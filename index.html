<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Text — Pixel Font Renderer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --border: #2a2a35;
    --accent: #e8ff47;
    --accent2: #ff6b47;
    --text: #e2e2e8;
    --muted: #666680;
    --panel: #1a1a22;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  .logo {
    font-family: 'VT323', monospace;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .logo span { color: var(--muted); }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
  }

  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    border-radius: 3px;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent); }

  .control-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-row label {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .control-row label span {
    color: var(--accent);
    font-weight: 600;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .color-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .color-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  input[type=color] {
    width: 100%;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  .btn {
    width: 100%;
    padding: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--accent);
    color: var(--bg);
    border: none;
    cursor: pointer;
    border-radius: 3px;
    font-weight: 600;
    transition: opacity 0.15s;
    margin-top: 4px;
  }

  .btn:hover { opacity: 0.85; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    margin-top: 0;
  }

  .canvas-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    overflow: auto;
    background:
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 8px,
        rgba(255,255,255,0.012) 8px,
        rgba(255,255,255,0.012) 16px
      ),
      var(--bg);
  }

  #output-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    max-width: 100%;
  }

  #canvas-output {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .info-bar {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .divider {
    height: 1px;
    background: var(--border);
  }

  #status {
    font-size: 11px;
    color: var(--accent2);
    min-height: 16px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">PIXEL<span>·</span>TEXT</div>
  <div class="tagline">Pixel Font Renderer</div>
</header>

<div class="main">
  <div class="sidebar">
    <div>
      <div class="section-label">Input Text</div>
      <textarea id="text-input" rows="3" placeholder="Type your text…">Pixels?</textarea>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">Spacing</div>
      <div class="control-row">
        <label>Letter spacing <span id="ls-val">1</span>px</label>
        <input type="range" id="letter-spacing" min="0" max="5" value="1">
      </div>
      <div class="control-row" style="margin-top:12px">
        <label>Space width <span id="sw-val">5</span>px</label>
        <input type="range" id="space-width" min="1" max="10" value="5">
      </div>
      <div class="control-row" style="margin-top:12px">
        <label>Padding <span id="pd-val">2</span>px</label>
        <input type="range" id="padding" min="0" max="10" value="2">
      </div>
      <div class="control-row" style="margin-top:12px">
        <label>Line spacing <span id="lsp-val">1</span>px</label>
        <input type="range" id="line-spacing" min="0" max="10" value="1">
      </div>
    </div>

    <div class="divider"></div>

    <div id="pixel-controls">
      <div class="section-label">Pixel Grid</div>
      <div class="control-row">
        <label>Cell size <span id="cs-val">12</span>px</label>
        <input type="range" id="cell-size" min="4" max="24" value="12">
      </div>
      <div class="color-row" style="margin-top:12px">
        <div class="color-field">
          <label style="font-size:10px;color:var(--muted)">On pixel</label>
          <input type="color" id="on-color" value="#111111">
        </div>
        <div class="color-field">
          <label style="font-size:10px;color:var(--muted)">Off A</label>
          <input type="color" id="off-a-color" value="#c8c8c8">
        </div>
        <div class="color-field">
          <label style="font-size:10px;color:var(--muted)">Off B</label>
          <input type="color" id="off-b-color" value="#f0f0f0">
        </div>
      </div>
    </div>

    <div id="status"></div>

    <button class="btn btn-secondary" id="download-btn">↓ Download PNG</button>
  </div>

  <div class="canvas-area">
    <div id="output-container">
      <div class="info-bar" id="info-bar">—</div>
      <canvas id="canvas-output"></canvas>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// FONT DATA
// ──────────────────────────────────────────────
const GLYPHS = {
  'A': { rows: ['01110','10001','11111','10001','10001','10001','10001'], width: 5, descender: 0 },
  'B': { rows: ['11110','10001','11110','10001','10001','10001','11110'], width: 5, descender: 0 },
  'C': { rows: ['01110','10001','10000','10000','10000','10001','01110'], width: 5, descender: 0 },
  'D': { rows: ['11110','10001','10001','10001','10001','10001','11110'], width: 5, descender: 0 },
  'E': { rows: ['11111','10000','11110','10000','10000','10000','11111'], width: 5, descender: 0 },
  'F': { rows: ['11111','10000','11100','10000','10000','10000','10000'], width: 5, descender: 0 },
  'G': { rows: ['01111','10000','10011','10001','10001','10001','01110'], width: 5, descender: 0 },
  'H': { rows: ['10001','10001','11111','10001','10001','10001','10001'], width: 5, descender: 0 },
  'I': { rows: ['111','010','010','010','010','010','111'], width: 3, descender: 0 },
  'J': { rows: ['00001','00001','00001','00001','00001','10001','01110'], width: 5, descender: 0 },
  'K': { rows: ['10001','10010','11100','10010','10001','10001','10001'], width: 5, descender: 0 },
  'L': { rows: ['1000','1000','1000','1000','1000','1000','1111'], width: 4, descender: 0 },
  'M': { rows: ['10001','11011','10101','10001','10001','10001','10001'], width: 5, descender: 0 },
  'N': { rows: ['10001','11001','10101','10011','10001','10001','10001'], width: 5, descender: 0 },
  'O': { rows: ['01110','10001','10001','10001','10001','10001','01110'], width: 5, descender: 0 },
  'P': { rows: ['11110','10001','11110','10000','10000','10000','10000'], width: 5, descender: 0 },
  'Q': { rows: ['01110','10001','10001','10001','10001','10010','01101'], width: 5, descender: 0 },
  'R': { rows: ['11110','10001','11110','10001','10001','10001','10001'], width: 5, descender: 0 },
  'S': { rows: ['01111','10000','01110','00001','00001','10001','01110'], width: 5, descender: 0 },
  'T': { rows: ['11111','00100','00100','00100','00100','00100','00100'], width: 5, descender: 0 },
  'U': { rows: ['10001','10001','10001','10001','10001','10001','01110'], width: 5, descender: 0 },
  'V': { rows: ['10001','10001','10001','10001','01010','01010','00100'], width: 5, descender: 0 },
  'W': { rows: ['10001','10001','10001','10001','10101','11011','10001'], width: 5, descender: 0 },
  'X': { rows: ['10001','01010','00100','01010','10001','10001','10001'], width: 5, descender: 0 },
  'Y': { rows: ['10001','01010','00100','00100','00100','00100','00100'], width: 5, descender: 0 },
  'Z': { rows: ['11111','00001','00010','00100','01000','10000','11111'], width: 5, descender: 0 },

  'a': { rows: ['00000','00000','01110','00001','01111','10001','01111'], width: 5, descender: 0 },
  'b': { rows: ['10000','10000','10110','11001','10001','10001','11110'], width: 5, descender: 0 },
  'c': { rows: ['00000','00000','01110','10001','10000','10001','01110'], width: 5, descender: 0 },
  'd': { rows: ['00001','00001','01101','10011','10001','10001','01111'], width: 5, descender: 0 },
  'e': { rows: ['00000','00000','01110','10001','11111','10000','01110'], width: 5, descender: 0 },
  'f': { rows: ['0011','0100','1111','0100','0100','0100','0100'], width: 4, descender: 0 },
  'g': { rows: ['00000','00000','01101','10011','10001','01111','00001','11110'], width: 5, descender: 1 },
  'h': { rows: ['10000','10000','10110','11001','10001','10001','10001'], width: 5, descender: 0 },
  'i': { rows: ['1','0','1','1','1','1','1'], width: 1, descender: 0 },
  'j': { rows: ['00001','00000','00001','00001','00001','10001','10001','01110'], width: 5, descender: 1 },
  'k': { rows: ['1000','1000','1001','1010','1100','1010','1001'], width: 4, descender: 0 },
  'l': { rows: ['10','10','10','10','10','10','01'], width: 2, descender: 0 },
  'm': { rows: ['00000','00000','11010','10101','10001','10001','10001'], width: 5, descender: 0 },
  'n': { rows: ['00000','00000','10110','11001','10001','10001','10001'], width: 5, descender: 0 },
  'o': { rows: ['00000','00000','01110','10001','10001','10001','01110'], width: 5, descender: 0 },
  'p': { rows: ['00000','00000','10110','11001','10001','10001','11110','10000','10000'], width: 5, descender: 2 },
  'q': { rows: ['00000','00000','01101','10011','10001','10001','01111','00001','00001'], width: 5, descender: 2 },
  'r': { rows: ['00000','00000','10110','11001','10000','10000','10000'], width: 5, descender: 0 },
  's': { rows: ['00000','00000','01111','10000','01110','00001','11110'], width: 5, descender: 0 },
  't': { rows: ['010','111','010','010','010','010','001'], width: 3, descender: 0 },
  'u': { rows: ['00000','00000','10001','10001','10001','10011','01101'], width: 5, descender: 0 },
  'v': { rows: ['00000','00000','10001','10001','10001','01010','00100'], width: 5, descender: 0 },
  'w': { rows: ['00000','00000','10001','10001','10101','10101','01111'], width: 5, descender: 0 },
  'x': { rows: ['00000','00000','10001','01010','00100','01010','10001'], width: 5, descender: 0 },
  'y': { rows: ['00000','00000','10001','10001','10001','01111','00001','11110'], width: 5, descender: 1 },
  'z': { rows: ['00000','00000','11111','00010','00100','01000','11111'], width: 5, descender: 0 },
};

// ──────────────────────────────────────────────
// RENDERING
// ──────────────────────────────────────────────

function renderLine(line, opts) {
  const { letterSpacing, spaceWidth, padding } = opts;
  const chars = line.split('');
  const nonSpaceChars = chars.filter(c => c !== ' ' && GLYPHS[c]);

  let maxDescender = 0;
  for (const c of chars) {
    if (c !== ' ' && GLYPHS[c]) {
      maxDescender = Math.max(maxDescender, GLYPHS[c].descender);
    }
  }

  const totalRows = padding + 7 + maxDescender + padding;

  // compute total cols
  let totalCols = padding * 2;
  for (let i = 0; i < chars.length; i++) {
    const c = chars[i];
    if (c === ' ') {
      totalCols += spaceWidth;
    } else if (GLYPHS[c]) {
      totalCols += GLYPHS[c].width;
    } else {
      totalCols += 5; // placeholder
    }
    if (i < chars.length - 1 && c !== ' ') {
      totalCols += letterSpacing;
    }
  }

  // build pixel grid
  const grid = [];
  for (let r = 0; r < totalRows; r++) {
    grid.push(new Uint8Array(totalCols));
  }

  for (let pr = 0; pr < 7 + maxDescender; pr++) {
    const canvasRow = pr + padding;
    let cx = padding;

    for (let ci = 0; ci < chars.length; ci++) {
      const c = chars[ci];
      if (c === ' ') {
        cx += spaceWidth;
      } else if (GLYPHS[c]) {
        const g = GLYPHS[c];
        if (pr < g.rows.length) {
          for (let px = 0; px < g.width; px++) {
            grid[canvasRow][cx + px] = g.rows[pr][px] === '1' ? 1 : 0;
          }
        }
        cx += g.width;
        if (ci < chars.length - 1) cx += letterSpacing;
      } else {
        // placeholder 5×7 solid block
        if (pr < 7) {
          for (let px = 0; px < 5; px++) grid[canvasRow][cx + px] = 1;
        }
        cx += 5;
        if (ci < chars.length - 1) cx += letterSpacing;
      }
    }
  }

  return { grid, totalRows, totalCols };
}

function buildFullGrid(text, opts) {
  const { lineSpacing, padding } = opts;
  const lines = text.split('\n');
  const rendered = lines.map(l => renderLine(l, opts));
  const maxW = Math.max(...rendered.map(r => r.totalCols));
  const combined = [];
  for (let i = 0; i < rendered.length; i++) {
    let grid = rendered[i].grid;
    // Strip top padding rows from every line except the first
    if (i > 0) grid = grid.slice(padding);
    // Strip bottom padding rows from every line except the last
    if (i < rendered.length - 1) grid = grid.slice(0, grid.length - padding);
    combined.push(...grid);
    if (i < rendered.length - 1) {
      for (let s = 0; s < lineSpacing; s++) {
        combined.push(new Uint8Array(maxW));
      }
    }
  }
  const totalCols = maxW;
  return { grid: combined, totalRows: combined.length, totalCols };
}

function renderPixelCanvas(canvas, text, opts) {
  const { cellSize, onColor, offA, offB } = opts;
  const { grid, totalRows, totalCols } = buildFullGrid(text, opts);

  canvas.width = totalCols * cellSize;
  canvas.height = totalRows * cellSize;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const onRGB = hexToRGB(onColor);
  const offARGB = hexToRGB(offA);
  const offBRGB = hexToRGB(offB);

  const imageData = ctx.createImageData(canvas.width, canvas.height);
  const data = imageData.data;

  for (let ry = 0; ry < totalRows; ry++) {
    for (let cx = 0; cx < totalCols; cx++) {
      const on = grid[ry] ? grid[ry][cx] === 1 : false;
      const startX = cx * cellSize;
      const startY = ry * cellSize;

      for (let py = 0; py < cellSize; py++) {
        for (let px = 0; px < cellSize; px++) {
          const screenX = startX + px;
          const screenY = startY + py;
          const idx = (screenY * canvas.width + screenX) * 4;

          // White border (bottom/right 1px)
          if (px === cellSize - 1 || py === cellSize - 1) {
            data[idx] = 255; data[idx+1] = 255; data[idx+2] = 255; data[idx+3] = 255;
          } else if (on) {
            data[idx] = onRGB[0]; data[idx+1] = onRGB[1]; data[idx+2] = onRGB[2]; data[idx+3] = 255;
          } else {
            const checker = (cx + ry) % 2 === 0;
            const col = checker ? offARGB : offBRGB;
            data[idx] = col[0]; data[idx+1] = col[1]; data[idx+2] = col[2]; data[idx+3] = 255;
          }
        }
      }
    }
  }

  ctx.putImageData(imageData, 0, 0);
  return { totalRows, totalCols };
}

function hexToRGB(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

// ──────────────────────────────────────────────
// UI
// ──────────────────────────────────────────────

const textInput = document.getElementById('text-input');
const letterSpacingInput = document.getElementById('letter-spacing');
const spaceWidthInput = document.getElementById('space-width');
const paddingInput = document.getElementById('padding');
const cellSizeInput = document.getElementById('cell-size');
const onColorInput = document.getElementById('on-color');
const offAInput = document.getElementById('off-a-color');
const offBInput = document.getElementById('off-b-color');
const lineSpacingInput = document.getElementById('line-spacing');
const canvasEl = document.getElementById('canvas-output');
const infoBar = document.getElementById('info-bar');
const statusEl = document.getElementById('status');

document.getElementById('ls-val').textContent = letterSpacingInput.value;
document.getElementById('sw-val').textContent = spaceWidthInput.value;
document.getElementById('pd-val').textContent = paddingInput.value;
document.getElementById('cs-val').textContent = cellSizeInput.value;
document.getElementById('lsp-val').textContent = lineSpacingInput.value;

function getOpts() {
  return {
    letterSpacing: parseInt(letterSpacingInput.value),
    spaceWidth: parseInt(spaceWidthInput.value),
    padding: parseInt(paddingInput.value),
    lineSpacing: parseInt(lineSpacingInput.value),
    cellSize: parseInt(cellSizeInput.value),
    onColor: onColorInput.value,
    offA: offAInput.value,
    offB: offBInput.value,
  };
}

function update() {
  const text = textInput.value || ' ';
  const opts = getOpts();
  statusEl.textContent = '';

  try {
    const { totalRows, totalCols } = renderPixelCanvas(canvasEl, text, opts);
    infoBar.textContent = `${totalCols} × ${totalRows} px  ·  cell ${opts.cellSize}px  ·  canvas ${canvasEl.width}×${canvasEl.height}`;
  } catch(e) {
    statusEl.textContent = 'Error: ' + e.message;
  }
}

// Slider labels
letterSpacingInput.addEventListener('input', () => { document.getElementById('ls-val').textContent = letterSpacingInput.value; update(); });
spaceWidthInput.addEventListener('input', () => { document.getElementById('sw-val').textContent = spaceWidthInput.value; update(); });
paddingInput.addEventListener('input', () => { document.getElementById('pd-val').textContent = paddingInput.value; update(); });
cellSizeInput.addEventListener('input', () => { document.getElementById('cs-val').textContent = cellSizeInput.value; update(); });
lineSpacingInput.addEventListener('input', () => { document.getElementById('lsp-val').textContent = lineSpacingInput.value; update(); });

[textInput, onColorInput, offAInput, offBInput].forEach(el => {
  el.addEventListener('input', update);
});

document.getElementById('download-btn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'pixel-text.png';
  link.href = canvasEl.toDataURL('image/png');
  link.click();
});

update();
</script>
</body>
</html>
